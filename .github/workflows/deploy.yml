name: Deploy Formbricks a Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Crear volumen si no existe
        run: |
          fly volumes create formbricks_uploads \
            --app formbricks-kusmedios-fly \
            --region dfw \
            --size 5 \
            --yes || echo "Volumen ya existe, continuando..."

      - name: Setear secrets en Fly.io
        run: |
          fly secrets set \
            DATABASE_URL="postgresql://fly-user:P5GeW52Z3DgOgMldNFTlpdGo@direct.9jknq0393gn068w3.flympg.net/Ajua" \
            WEBAPP_URL="https://formbricks-kusmedios-fly.fly.dev" \
            NEXTAUTH_URL="https://formbricks-kusmedios-fly.fly.dev" \
            --app formbricks-kusmedios-fly

      - name: Deploy a Fly.io
        run: |
          fly deploy --app formbricks-kusmedios-fly \
            --image ghcr.io/formbricks/formbricks:latest \
            --ha=false
