name: Deploy Formbricks a Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Crear volumen
        run: |
          fly volumes create formbricks_uploads \
            --app formbricks-kusmedios-fly \
            --region dfw \
            --size 5 \
            --yes || echo "Volumen ya existe, continuando..."

      - name: Deploy a Fly.io
        run: |
          fly deploy --app formbricks-kusmedios-fly \
            --image ghcr.io/formbricks/formbricks:latest \
            --ha=false
