name: Deploy Formbricks a Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Crear volumen si no existe
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          VOLUMES=$(fly volumes list --app formbricks-kusmedios-fly --json 2>/dev/null || echo '[]')
          COUNT=$(echo "$VOLUMES" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len([v for v in data if v.get('name')=='formbricks_uploads']))" 2>/dev/null || echo 0)
          if [ "$COUNT" -eq "0" ]; then
            echo "Creando volumen formbricks_uploads..."
            fly volumes create formbricks_uploads \
              --app formbricks-kusmedios-fly \
              --region dfw \
              --size 5 \
              --yes
          else
            echo "Volumen ya existe, continuando..."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy a Fly.io
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          fly deploy --app formbricks-kusmedios-fly \
            --image ghcr.io/formbricks/formbricks:latest \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
