name: Deploy Formbricks a Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Crear volumen
        run: |
          fly volumes create formbricks_uploads \
            --app formbricks-kusmedios-fly \
            --region dfw \
            --size 5 \
            --yes || echo "Volumen ya existe, continuando..."

      - name: Configurar secrets de Formbricks
        run: |
          fly secrets set \
            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            WEBAPP_URL="https://formbricks-kusmedios-fly.fly.dev" \
            NEXTAUTH_URL="https://formbricks-kusmedios-fly.fly.dev" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            EMAIL_VERIFICATION_DISABLED="1" \
            PASSWORD_RESET_DISABLED="1" \
            --app formbricks-kusmedios-fly

      - name: Deploy a Fly.io
        run: |
          fly deploy --app formbricks-kusmedios-fly \
            --image ghcr.io/formbricks/formbricks:latest \
            --ha=false
